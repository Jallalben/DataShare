name: CI — DataShare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # 1. Tests unitaires Backend
  # ─────────────────────────────────────────
  backend-unit:
    name: 🧪 Backend — Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances
        working-directory: backend
        run: npm ci

      - name: Lancement des tests unitaires
        working-directory: backend
        run: npm run test -- --coverage

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # ─────────────────────────────────────────
  # 2. Tests d'intégration Backend (E2E API)
  # ─────────────────────────────────────────
  backend-e2e:
    name: 🔗 Backend — Tests d'intégration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datashare
          POSTGRES_PASSWORD: datashare_test
          POSTGRES_DB: datashare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: datashare
      DB_PASSWORD: datashare_test
      DB_NAME: datashare_test
      JWT_SECRET: test_secret_key_for_ci
      JWT_EXPIRATION: 3600s
      NODE_ENV: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances
        working-directory: backend
        run: npm ci

      - name: Lancement des tests d'intégration
        working-directory: backend
        run: npm run test:e2e

  # ─────────────────────────────────────────
  # 3. Tests unitaires Frontend
  # ─────────────────────────────────────────
  frontend-unit:
    name: 🎨 Frontend — Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: frontend
        run: npm install

      - name: Lancement des tests
        working-directory: frontend
        run: npm run test

  # ─────────────────────────────────────────
  # 4. Build de vérification
  # ─────────────────────────────────────────
  build-check:
    name: 🏗️ Vérification du build
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-unit]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build Docker (vérification)
        run: docker compose build
