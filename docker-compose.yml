version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: datashare-db
    environment:
      POSTGRES_DB: ${DB_NAME:-datashare}
      POSTGRES_USER: ${DB_USER:-datashare}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-datashare123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-datashare}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datashare-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: datashare-api
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-datashare}
      DB_USER: ${DB_USER:-datashare}
      DB_PASSWORD: ${DB_PASSWORD:-datashare123}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-1073741824}
    volumes:
      - ./backend/src:/app/src
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - datashare-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: datashare-front
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3001}/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - datashare-network

volumes:
  postgres_data:
    name: datashare-postgres-data
  uploads:
    name: datashare-uploads

networks:
  datashare-network:
    name: datashare-network
    driver: bridge
